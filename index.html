<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Docker App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

    <div class="container text-center mt-5">
        <div class="card shadow-lg p-4 bg-secondary">
            <h1 class="mb-3"> Node + Docker App</h1>
            <p class="lead">Hello Megha! Your app is running successfully.</p>

            <button class="btn btn-warning mt-3" onclick="showMessage()">
                Click Me 
            </button>

            <h3 class="mt-4" id="msg"></h3>
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById("msg").innerText = "🔥 You triggered frontend + backend!";
        }
    </script>

</body>
</html>
